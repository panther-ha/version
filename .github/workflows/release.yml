name: Release docker images

on:
  repository_dispatch:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id }} == ${{ github.event.sender.id }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - id: load_version
        run: |
          content=`cat ./stable.json`
          # the following lines are only required for multi line json
          content="${content//'%'/'%25'}"
          content="${content//$'\n'/'%0A'}"
          content="${content//$'\r'/'%0D'}"
          # end of optional handling for multi line json
          echo "::set-output name=packageJson::$content"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker pull ghcr.io/home-assistant/green-homeassistant:landingpage
          docker tag ghcr.io/home-assistant/green-homeassistant:landingpage ghcr.io/panther-ha/panther-homeassistant:landingpage
          docker push ghcr.io/panther-ha/panther-homeassistant:landingpage
          docker pull ghcr.io/home-assistant/green-homeassistant:${{fromJson(steps.load_version.outputs.packageJson).homeassistant.default}}
          docker tag ghcr.io/home-assistant/green-homeassistant:${{fromJson(steps.load_version.outputs.packageJson).homeassistant.default}} ghcr.io/panther-ha/panther-homeassistant:${{fromJson(steps.load_version.outputs.packageJson).homeassistant.default}}
          docker push ghcr.io/panther-ha/panther-homeassistant:${{fromJson(steps.load_version.outputs.packageJson).homeassistant.default}}

